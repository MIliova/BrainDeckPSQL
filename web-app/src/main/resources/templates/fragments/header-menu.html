<nav th:fragment="header-menu" class="container-left-right blue-row">
    <a class="blue-row-a-img" th:href="@{/my/folders}"><img width="20" src="/images/folders.png" th:alt="#{messages.folder.folders_my}" />[[#{messages.folder.folders}]]</a>
    <a class="blue-row-a-img" th:href="@{/my/create-folder}"><img width="20" src="/images/add-folder.png" th:alt="#{messages.folder.create}" />[[#{messages.folder.create}]]</a>
    <a class="blue-row-a-img" th:href="@{/my/sets}"><img width="20" src="/images/sets.png" th:alt="#{messages.set.sets_my}" />[[#{messages.set.sets}]]</a>
    <a class="blue-row-a-img" th:href="@{/draft}"><img width="20" src="/images/add-set.png" th:alt="#{messages.set.create}" />[[#{messages.set.create}]]</a>
    <div th:if="${avLangs != null and !avLangs.isEmpty()}">
        <form action="">
            <select name="lang" onchange="this.form.submit()">
                <option th:each="al : ${avLangs}"
                        th:value="${al.key}"
                        th:text="${al.value}"
                        th:selected="${curLang==al.key}"></option>
            </select>
        </form>
    </div>
</nav>
